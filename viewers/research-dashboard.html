<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clear · Research Dashboard</title>
  <link rel="stylesheet" href="../tokens.css">
  <link rel="stylesheet" href="research-dashboard.css">
</head>
<body>
  <div class="rd-shell">
    <!-- Header -->
    <header class="rd-header">
      <div class="rd-header-top">
        <div class="rd-brand">
          <div class="rd-brand-mark">C</div>
          <span class="rd-brand-wordmark">Clear / Research</span>
        </div>
        <span class="rd-header-spacer"></span>
        <input type="text" id="searchInput" class="rd-search" placeholder="Search logs, users, sessions...">
        <select id="userFilter" class="rd-select">
          <option value="">All Users</option>
        </select>
        <button id="refreshBtn" class="clear-btn clear-btn--sm clear-btn--ghost">Refresh</button>
        <button id="exportAllBtn" class="clear-btn clear-btn--sm clear-btn--primary" onclick="exportAll()">Export</button>
      </div>
      <nav class="rd-tabs">
        <button class="tab active" data-tab="overview">Overview</button>
        <button class="tab" data-tab="conversations">Conversations</button>
        <button class="tab" data-tab="feedback">Feedback</button>
        <button class="tab" data-tab="preferences">Preferences</button>
        <button class="tab" data-tab="logs">Logs</button>
        <button class="tab" data-tab="export">Export</button>
      </nav>
    </header>

    <!-- Overview Tab -->
    <div class="tab-content active" id="tab-overview">
      <div class="rd-kpi-strip" id="kpiStrip">
        <div class="rd-kpi-card">
          <span class="clear-eyebrow">Sessions</span>
          <div class="rd-kpi-value" id="kpiSessions">—</div>
          <div class="rd-kpi-delta" id="kpiSessionsDelta"></div>
        </div>
        <div class="rd-kpi-card">
          <span class="clear-eyebrow">Feedback events</span>
          <div class="rd-kpi-value" id="kpiFeedback">—</div>
          <div class="rd-kpi-delta" id="kpiFeedbackDelta"></div>
        </div>
        <div class="rd-kpi-card">
          <span class="clear-eyebrow">Users</span>
          <div class="rd-kpi-value" id="kpiUsers">—</div>
          <div class="rd-kpi-delta" id="kpiUsersDelta"></div>
        </div>
      </div>

      <div class="rd-overview-grid">
        <!-- Feedback distribution -->
        <div class="rd-card">
          <span class="clear-eyebrow">Feedback distribution</span>
          <div class="rd-feedback-bar" id="feedbackBar">
            <div class="rd-fb-pos" style="flex:1"></div>
            <div class="rd-fb-neu" style="flex:0"></div>
            <div class="rd-fb-neg" style="flex:0"></div>
          </div>
          <div class="rd-feedback-legend" id="feedbackLegend"></div>
        </div>

      </div>
    </div>

    <!-- Conversations Tab -->
    <div class="tab-content" id="tab-conversations">
      <div id="conversationsList"></div>
    </div>

    <!-- Feedback Tab -->
    <div class="tab-content" id="tab-feedback">
      <div id="feedbackList"></div>
    </div>

    <!-- Preferences Tab -->
    <div class="tab-content" id="tab-preferences">
      <div id="preferencesList"></div>
    </div>

    <!-- Research Logs Tab -->
    <div class="tab-content" id="tab-logs">
      <div class="rd-log-controls">
        <select id="logCategoryFilter" class="rd-select">
          <option value="">All Categories</option>
          <option value="renarration">Renarration</option>
          <option value="feedback">Feedback</option>
          <option value="chatbot">Chatbot</option>
        </select>
      </div>
      <div id="logsList"></div>
    </div>

    <!-- Export Tab -->
    <div class="tab-content" id="tab-export">
      <p class="rd-export-desc">Export research data as JSON or CSV files. Use the user filter above to export per-participant data.</p>
      <div class="export-section" id="exportSection"></div>
    </div>
  </div>

  <script src="research-dashboard.js"></script>
</body>
</html>
