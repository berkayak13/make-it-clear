<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReNarrator — Pipeline Visualizer</title>
  <link rel="stylesheet" href="../tokens.css">
  <link rel="stylesheet" href="pipeline-visualizer.css">
</head>
<body>
  <header class="viz-header">
    <div class="viz-header__left">
      <h1>Pipeline Visualizer</h1>
      <span class="viz-header__sub">12-Agent Agentic Pipeline</span>
    </div>
    <div class="viz-header__right">
      <div class="running-indicator" id="runningIndicator" style="display:none">
        <div class="running-indicator__dot"></div>
        <span>Running</span>
      </div>
      <div class="pipeline-badge" id="pipelineBadge">Idle</div>
      <button class="clear-btn" id="clearBtn" title="Clear visualizer state" aria-label="Clear visualizer state">Clear</button>
    </div>
  </header>

  <div class="viz-layout">
    <aside class="run-history" id="runHistory">
      <h2>Pipeline Runs</h2>
      <div id="runList"></div>
    </aside>

    <main class="viz-main">
      <!-- Phase Timeline -->
      <div class="phase-timeline" id="phaseTimeline"></div>

      <!-- Pipeline Diagram -->
      <div class="pipeline-diagram" id="pipelineDiagram"></div>

      <!-- Tabs -->
      <div class="viz-tabs" role="tablist">
        <button class="viz-tab active" data-tab="metrics" role="tab" aria-selected="true" aria-controls="metricsPanel">Metrics</button>
        <button class="viz-tab" data-tab="inspector" role="tab" aria-selected="false" aria-controls="inspectorPanel">Data Inspector</button>
        <button class="viz-tab" data-tab="memory" role="tab" aria-selected="false" aria-controls="memoryPanel">Memory State</button>
        <button class="viz-tab" data-tab="diagrams" role="tab" aria-selected="false" aria-controls="diagramsPanel">Diagrams</button>
      </div>

      <!-- Tab Panels -->
      <div class="tab-content" id="tabContent">
        <div id="metricsPanel" class="tab-panel active" role="tabpanel"></div>
        <div id="inspectorPanel" class="tab-panel" role="tabpanel"></div>
        <div id="memoryPanel" class="tab-panel" role="tabpanel"></div>
        <div id="diagramsPanel" class="tab-panel" role="tabpanel"></div>
      </div>
    </main>
  </div>

  <script src="pipeline-visualizer.js"></script>
</body>
</html>
