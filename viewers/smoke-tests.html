<!DOCTYPE html>
<html>
<head>
  <title>Smoke Tests — Renarration Extension</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
    h1 { font-size: 1.5em; }
    .test { padding: 12px 16px; margin: 8px 0; border-radius: 8px; background: #f5f5f5; display: flex; justify-content: space-between; align-items: center; }
    .test.pass { background: #e8f5e9; }
    .test.fail { background: #ffebee; }
    .test.running { background: #fff3e0; }
    .badge { padding: 4px 12px; border-radius: 12px; font-size: 0.85em; font-weight: 600; }
    .badge.pass { background: #4caf50; color: white; }
    .badge.fail { background: #f44336; color: white; }
    .badge.running { background: #ff9800; color: white; }
    .badge.pending { background: #9e9e9e; color: white; }
    .error-detail { font-size: 0.85em; color: #c62828; margin-top: 4px; }
    #summary { margin: 20px 0; padding: 16px; border-radius: 8px; font-weight: 600; }
    #summary.all-pass { background: #e8f5e9; color: #2e7d32; }
    #summary.some-fail { background: #ffebee; color: #c62828; }
    button { padding: 10px 24px; border: none; border-radius: 8px; background: #1976d2; color: white; font-size: 1em; cursor: pointer; margin: 4px; }
    button:hover { background: #1565c0; }
    button:disabled { background: #bdbdbd; cursor: not-allowed; }
  </style>
</head>
<body>
  <h1>Smoke Tests</h1>
  <div>
    <button id="runAllBtn">Run All Tests</button>
    <button id="clearBtn">Clear Results</button>
  </div>
  <div id="summary" style="display:none;"></div>
  <div id="tests"></div>
  <script src="smoke-tests.js"></script>
</body>
</html>
