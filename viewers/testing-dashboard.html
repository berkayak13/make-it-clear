<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Testing Dashboard</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; margin: 0; background: #f7fafc; color: #2d3748; }
    .container { max-width: 1200px; width: min(1200px, calc(100% - 32px)); margin: 20px auto; padding: 16px; background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; box-shadow: 0 6px 18px rgba(0,0,0,0.05); }
    h1 { margin: 0 0 8px; font-size: 20px; color: #1a202c; }
    .meta { font-size: 12px; color: #718096; margin-bottom: 12px; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 12px; }
    button { background: white; color: #667eea; border: 2px solid #667eea; padding: 6px 12px; border-radius: 6px; font-size: 13px; cursor: pointer; transition: all 0.2s; font-weight: 500; height: 34px; }
    button:hover { background: #667eea; color: white; }
    .table-wrapper { width: 100%; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; min-width: 960px; }
    th, td { border: 1px solid #e2e8f0; padding: 8px; vertical-align: top; word-break: break-word; }
    th { background: #edf2f7; text-align: left; }
    .pill { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 12px; color: white; }
    .pill.success { background: #48bb78; }
    .pill.fail { background: #e53e3e; }
    .code { white-space: pre-wrap; font-family: monospace; background: #f7fafc; border: 1px solid #e2e8f0; border-radius: 4px; padding: 6px; }
    .link-btn, select.link-btn { background: white; color: #667eea; border: 2px solid #667eea; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; height: 34px; }
    .link-btn:hover, select.link-btn:hover { background: #667eea; color: white; }
    .search-input { padding: 6px 12px; border: 2px solid #e2e8f0; border-radius: 6px; font-size: 13px; height: 34px; min-width: 200px; transition: border-color 0.2s; }
    .search-input:focus { outline: none; border-color: #667eea; }
    .modal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.45); display:none; align-items:center; justify-content:center; z-index:9999; }
    .modal-content { background: white; border-radius: 8px; max-width: 720px; width: 92%; max-height: 80vh; display:flex; flex-direction:column; box-shadow: 0 12px 30px rgba(0,0,0,0.2); }
    .modal-header { padding: 12px 16px; border-bottom: 1px solid #e2e8f0; display:flex; align-items:center; justify-content:space-between; }
    .modal-body { padding: 12px 16px; overflow:auto; }
    .modal-close { background:none; border:none; font-size:18px; cursor:pointer; }
    .button-cell { text-align: center; vertical-align: middle; }
    .actions-cell { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Testing Dashboard</h1>
    <div class="meta">Remote VLM → LLM renarration runs</div>
    <div class="actions">
      <button id="refreshBtn">🔄 Refresh</button>
      <button id="clearBtn">🧹 Clear Logs</button>
      <button id="allFilterBtn" class="link-btn">All</button>
      <button id="starFilterBtn" class="link-btn">★ Starred</button>
      <select id="stageFilter" class="link-btn">
        <option value="all">All stages</option>
        <option value="capture">Capture</option>
        <option value="vlm">VLM</option>
        <option value="llm">LLM</option>
      </select>
      <input type="text" id="titleSearch" placeholder="🔍 Search by title..." class="search-input">
      <span id="status" class="meta"></span>
    </div>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Title</th>
            <th>Run ID</th>
            <th>Stage</th>
            <th>Result</th>
            <th>Model</th>
            <th>Duration</th>
            <th>Timestamp</th>
            <th>URL</th>
            <th>Error</th>
            <th>Input</th>
            <th>Content</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="logBody"></tbody>
      </table>
    </div>
  </div>

  <div id="contentModal" class="modal" style="display:none;">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modalTitle">Content</h3>
        <button class="modal-close" id="modalClose">×</button>
      </div>
      <div class="modal-body">
        <div id="modalContent" class="code"></div>
      </div>
    </div>
  </div>
  <script src="testing-dashboard.js"></script>
</body>
</html>
