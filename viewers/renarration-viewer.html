<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Renarration</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; margin: 0; background: #f7fafc; color: #2d3748; }
    .container { max-width: 1000px; margin: 20px auto; padding: 16px; background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; box-shadow: 0 6px 18px rgba(0,0,0,0.05); }
    h1 { margin: 0 0 8px; font-size: 18px; color: #1a202c; }
    .meta { font-size: 12px; color: #718096; margin-bottom: 12px; }
    .actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; flex-wrap: wrap; gap: 8px; }
    button { background: white; color: #667eea; border: 2px solid #667eea; padding: 6px 12px; border-radius: 6px; font-size: 13px; cursor: pointer; transition: all 0.2s; font-weight: 500; }
    button:hover { background: #667eea; color: white; }
    .block { margin-bottom: 12px; }
    .label { font-weight: 600; margin-bottom: 4px; }
    .panel { white-space: pre-wrap; font-family: monospace; font-size: 13px; background: #f7fafc; border: 1px solid #e2e8f0; border-radius: 6px; padding: 10px; min-height: 120px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Page Renarration</h1>
    <div class="meta" id="meta">Loading…</div>
    <div class="actions">
      <button id="refreshBtn">🔄 Refresh</button>
      <span id="status" class="meta"></span>
    </div>
    <div class="block">
      <div class="label">Renarration</div>
      <div id="renarrationOutput" class="panel"></div>
    </div>
    <div class="block">
      <div class="label">VLM Extracted Content</div>
      <div id="vlmOutput" class="panel"></div>
    </div>
  </div>
  <script src="renarration-viewer.js"></script>
</body>
</html>
