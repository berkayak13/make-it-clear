<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Renarration Test Runner</title>
  <style>
    body{font-family:system-ui;margin:20px;background:#f7fafc}
    h1{color:#667eea}
    button{margin:4px 8px;padding:8px 14px;border:0;border-radius:6px;background:#667eea;color:#fff;cursor:pointer}
    table{border-collapse:collapse;width:100%;margin-top:16px;font-size:13px}
    th,td{border:1px solid #e2e8f0;padding:6px;vertical-align:top}
    th{background:#edf2f7}
    textarea{width:100%;min-height:120px;resize:vertical}
    .eval-text{width:100%;min-height:120px;resize:vertical}
  </style>
</head>
<body>
  <h1>Renarration Automated Tests</h1>
  <div>
    <button id="runBtn">Run Test Cases</button>
    <button id="refreshBtn">Refresh Logs</button>
    <button id="exportBtn">Export Logs</button>
    <button id="clearBtn">Clear Logs</button>
  </div>
  <table id="logTable">
    <thead>
      <tr>
        <th>ID</th><th>Model</th><th>Persona</th><th>Task</th><th>Timestamp</th><th>Output/Error</th><th>Evaluation</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
  <script type="module" src="test-runner.js"></script>
</body>
</html>
