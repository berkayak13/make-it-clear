<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clear</title>
  <link rel="stylesheet" href="tokens.css">
  <style>
    :root {
      color-scheme: light dark;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --paper: oklch(0.21 0.012 255);
        --paper-2: oklch(0.24 0.012 254);
        --paper-3: oklch(0.28 0.014 252);
        --hairline: oklch(0.36 0.015 250);
        --hairline-soft: oklch(0.31 0.014 251);
        --muted: oklch(0.64 0.018 250);
        --muted-2: oklch(0.76 0.015 250);
        --ink-2: oklch(0.86 0.012 250);
        --ink: oklch(0.94 0.008 250);
        --accent: oklch(0.68 0.15 250);
        --accent-ink: oklch(0.78 0.12 250);
        --accent-soft: oklch(0.3 0.06 250);
      }
    }
    body {
      width: 320px;
      margin: 0;
      padding: 20px 24px;
      font-family: var(--font-sans);
      background: var(--paper);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    .popup-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .popup-wordmark {
      font-weight: 600;
      font-size: 15px;
      letter-spacing: -0.02em;
    }
    .popup-meta {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .popup-btn {
      width: 100%;
      padding: 10px 16px;
      border: none;
      border-radius: var(--r-2);
      font-family: var(--font-sans);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      user-select: none;
      transition: background var(--dur-fast) var(--ease), transform var(--dur-fast) var(--ease);
    }
    .popup-btn:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
    .popup-btn:active:not(:disabled) {
      transform: translateY(1px);
    }
    .popup-btn:disabled {
      opacity: 0.55;
      cursor: default;
    }
    .popup-btn--primary {
      background: var(--ink);
      color: var(--paper);
    }
    .popup-btn--primary:hover {
      background: var(--ink-2);
    }
    .popup-btn--ghost {
      background: color-mix(in oklch, var(--ink) 4%, transparent);
      color: var(--ink);
      margin-top: 8px;
    }
    .popup-btn--ghost:hover {
      background: color-mix(in oklch, var(--ink) 8%, transparent);
    }
    .popup-footer {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid var(--hairline-soft);
      display: flex;
      justify-content: center;
    }
    .popup-footer a {
      font-size: 12px;
      color: var(--muted);
      text-decoration: none;
      transition: color var(--dur-fast) var(--ease);
    }
    .popup-footer a:hover {
      color: var(--ink);
    }
    .popup-footer a:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
      border-radius: 4px;
    }
    .popup-status {
      margin-top: 10px;
      font-size: 12px;
      line-height: 1.45;
      color: var(--neg);
    }
  </style>
</head>
<body>
  <div class="popup-header">
    <span class="popup-wordmark">Clear</span>
    <span class="popup-meta" id="popupVersion">v1.0</span>
  </div>

  <button class="popup-btn popup-btn--primary" id="openOverlayBtn">
    <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M8 2v12M2 8h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    Open overlay
  </button>

  <button class="popup-btn popup-btn--ghost" id="settingsBtn">
    Settings
  </button>

  <button class="popup-btn popup-btn--ghost" id="viewExtractionBtn">
    View extracted page
  </button>

  <button class="popup-btn popup-btn--ghost" id="staticSiteBtn">
    Save static site
  </button>

  <div class="popup-status" id="popupStatus" hidden></div>

  <div class="popup-footer">
    <a href="#" id="optionsLink">Options</a>
  </div>

  <script src="popup-stub.js"></script>
</body>
</html>
