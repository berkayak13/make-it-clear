<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Renarration Assistant</title>
  <link rel="stylesheet" href="tokens.css">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <div class="header">
      <div class="header-left">
        <h1>OpenAI Renarration Assistant</h1>
      </div>
      <div class="header-right">
        <span class="user-badge" id="userBadge">--</span>
        <button class="new-session-btn" id="newSessionBtn" title="New conversation" aria-label="Start new conversation">+</button>
      </div>
    </div>

    <!-- Renarrate Button -->
    <div class="renarrate-section">
      <button id="renarratePageBtn" class="btn btn--primary btn--full btn--glow">Renarrate Page</button>
      <div id="renarrateStatus" class="action-status">Ready</div>
    </div>

    <!-- Chat Area -->
    <div class="chat-area">
      <div class="chat-messages" id="chatMessages">
        <div class="chat-welcome">
          <p>Tell me what you want to get from web content today.</p>
          <p class="chat-welcome-hint">I'll help you set a reading goal so content can be adapted to your needs.</p>
        </div>
      </div>

      <div class="goal-preview" id="goalPreview" style="display:none;">
        <div class="preview-header">
          <span>Reading Goal</span>
          <button class="preview-dismiss" id="goalDismiss" aria-label="Dismiss reading goal">&times;</button>
        </div>
        <div class="preview-body">
          <div class="preview-field"><strong>Goal:</strong> <span id="goalPreviewText"></span></div>
          <div class="preview-field"><strong>Depth:</strong> <span id="goalPreviewDepth"></span></div>
          <div class="preview-field"><strong>Focus:</strong> <span id="goalPreviewFocus"></span></div>
          <div class="preview-field"><strong>Style:</strong> <span id="goalPreviewStyle"></span></div>
          <div class="preview-field"><strong>Notes:</strong> <span id="goalPreviewNotes"></span></div>
        </div>
        <div class="preview-actions">
          <button class="btn btn--primary btn--sm" id="applyGoalBtn">Apply Goal</button>
          <button class="btn btn--secondary btn--sm" id="discardGoalBtn">Discard</button>
        </div>
      </div>


      <div class="refinement-banner" id="refinementBanner" style="display:none;">
        <span>Multiple negative feedbacks detected. Consider refining your persona.</span>
        <button class="btn btn--secondary btn--sm" id="refineBannerBtn">Refine</button>
        <button class="preview-dismiss" id="refineBannerDismiss" aria-label="Dismiss refinement suggestion">&times;</button>
      </div>

      <div class="quick-replies" id="quickReplies" style="display:none;"></div>

      <div class="chat-input-area">
        <button class="btn btn--primary btn--full" id="setGoalBtn" style="display:none;">Set Reading Goal</button>
        <div class="chat-secondary-actions" id="secondaryActions" style="display:none;">
        </div>
        <div class="chat-input-row">
          <textarea id="chatInput" placeholder="Type a message..." rows="1" aria-label="Chat message input"></textarea>
          <button class="send-btn" id="sendBtn" title="Send" aria-label="Send message">&#9654;</button>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer-bar">
      <a href="#" id="optionsLink" class="footer-link">Settings</a>
    </div>
  </div>

  <script src="lib/research-db.js"></script>
  <script src="popup.js"></script>
</body>
</html>
