<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clear</title>
  <link rel="stylesheet" href="tokens.css">
  <style>
    body {
      width: 260px;
      margin: 0;
      padding: 20px 24px;
      font-family: var(--font-sans);
      background: var(--paper);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
    }
    .popup-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .popup-wordmark {
      font-weight: 600;
      font-size: 15px;
      letter-spacing: -0.02em;
    }
    .popup-meta {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .popup-btn {
      width: 100%;
      padding: 10px 16px;
      border: none;
      border-radius: var(--r-2);
      font-family: var(--font-sans);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 150ms var(--ease);
    }
    .popup-btn--primary {
      background: var(--ink);
      color: var(--paper);
    }
    .popup-btn--primary:hover {
      background: var(--ink-2);
    }
    .popup-btn--ghost {
      background: color-mix(in oklch, var(--ink) 4%, transparent);
      color: var(--ink);
      margin-top: 8px;
    }
    .popup-btn--ghost:hover {
      background: color-mix(in oklch, var(--ink) 8%, transparent);
    }
    .popup-footer {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid var(--hairline-soft);
      display: flex;
      justify-content: center;
    }
    .popup-footer a {
      font-size: 12px;
      color: var(--muted);
      text-decoration: none;
      transition: color 150ms var(--ease);
    }
    .popup-footer a:hover {
      color: var(--ink);
    }
  </style>
</head>
<body>
  <div class="popup-header">
    <span class="popup-wordmark">Clear</span>
    <span class="popup-meta">v1.0</span>
  </div>

  <button class="popup-btn popup-btn--primary" id="openOverlayBtn">
    <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M8 2v12M2 8h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    Open Overlay
  </button>

  <button class="popup-btn popup-btn--ghost" id="settingsBtn">
    Settings
  </button>

  <button class="popup-btn popup-btn--ghost" id="viewExtractionBtn">
    View Extracted Page
  </button>

  <button class="popup-btn popup-btn--ghost" id="staticSiteBtn">
    Save Static Site
  </button>

  <div class="popup-footer">
    <a href="#" id="optionsLink">Options</a>
  </div>

  <script src="popup-stub.js"></script>
</body>
</html>
