<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clear</title>
  <link rel="stylesheet" href="tokens.css">
  <style>
    body {
      margin: 0;
      padding: 24px;
      font-family: var(--font-sans);
      background: var(--paper);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      box-sizing: border-box;
    }
    .sp-card {
      text-align: center;
      max-width: 240px;
    }
    .sp-wordmark {
      font-weight: 600;
      font-size: 18px;
      letter-spacing: -0.02em;
      margin-bottom: 6px;
    }
    .sp-tagline {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 20px;
      line-height: 1.4;
    }
    .sp-btn {
      width: 100%;
      padding: 10px 16px;
      border: none;
      border-radius: var(--r-2);
      font-family: var(--font-sans);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      background: var(--ink);
      color: var(--paper);
      transition: background 150ms var(--ease);
    }
    .sp-btn:hover {
      background: var(--ink-2);
    }
    .sp-hint {
      margin-top: 14px;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="sp-card">
    <div class="sp-wordmark">Clear</div>
    <div class="sp-tagline">The overlay lives on the page.<br>Open it from any tab.</div>
    <button class="sp-btn" id="openOverlayBtn">Open Overlay on This Tab</button>
    <div class="sp-hint">Or click the extension icon</div>
  </div>

  <script src="sidepanel-stub.js"></script>
</body>
</html>
