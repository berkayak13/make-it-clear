<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clear · UI exploration</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&family=Inter+Tight:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Tokens / global -->
  <link rel="stylesheet" href="styles.css">

  <style>
    html, body { margin: 0; padding: 0; background: #f0eee9; }
    body { font-family: 'Geist', system-ui, sans-serif; }
  </style>

  <!-- React + Babel pinned -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="shared.jsx"></script>
  <script type="text/babel" src="overlays.jsx"></script>
  <script type="text/babel" src="in-context.jsx"></script>
  <script type="text/babel" src="pages.jsx"></script>

  <script type="text/babel">
    const { useState } = React;

    /* Reusable artboard background: a believable webpage */
    function PageBoard({ tone = 'article', children }) {
      return (
        <div className="clear-board">
          <FakePage tone={tone}/>
          {children}
        </div>
      );
    }

    function App() {
      return (
        <DesignCanvas
          title="Clear"
          subtitle="On-page reading overlay — three directions, calm · explanatory · sharp"
        >
          {/* ════════ SECTION 1 — Floating overlay directions ════════ */}
          <DCSection
            id="overlays"
            title="① Floating overlay · three directions"
            subtitle="The persistent, draggable glass surface that sits on top of any webpage. Each direction is a different layout philosophy for the same product."
          >
            <DCArtboard id="wafer" label="A · Wafer — minimal pill" width={1200} height={780}>
              <PageBoard tone="article">
                <Wafer x={520} y={28}/>
              </PageBoard>
            </DCArtboard>

            <DCArtboard id="document" label="B · Document — reader companion" width={1200} height={780}>
              <PageBoard tone="docs">
                <DocumentOverlay x={800} y={90}/>
              </PageBoard>
            </DCArtboard>

            <DCArtboard id="compass" label="C · Compass — radial lens" width={1200} height={780}>
              <PageBoard tone="article">
                <Compass x={620} y={80}/>
              </PageBoard>
            </DCArtboard>
          </DCSection>

          {/* ════════ SECTION 2 — In-context interactions ════════ */}
          <DCSection
            id="in-context"
            title="② In-context interactions"
            subtitle="Selection-renarration, the split renarrated view, and the resting (collapsed) state for each overlay direction."
          >
            <DCArtboard id="selection" label="Selection · quick renarrate" width={900} height={620}>
              <div className="clear-board" style={{ background: '#fff' }}>
                <FakePage tone="docs"/>
                {/* Faux selection: highlighted text behind */}
                <div style={{ position: 'absolute', left: 304, top: 296, right: 56, height: 56, background: 'rgba(67, 97, 238, 0.18)', borderRadius: 4, mixBlendMode: 'multiply', pointerEvents: 'none' }}/>
                <SelectionPopup x={240} y={170}/>
              </div>
            </DCArtboard>

            <DCArtboard id="split" label="Split renarration view" width={1280} height={780}>
              <div className="clear-board">
                <SplitRenarration/>
              </div>
            </DCArtboard>

            <DCArtboard id="resting" label="Resting states · all three" width={520} height={560}>
              <div style={{ background: 'var(--paper-2)', height: '100%', width: '100%' }}>
                <CollapsedPills/>
              </div>
            </DCArtboard>
          </DCSection>

          {/* ════════ SECTION 3 — Full surfaces ════════ */}
          <DCSection
            id="full-surfaces"
            title="③ Full-page surfaces"
            subtitle="Settings, extracted-content viewer, research dashboard. All three share the design system; one direction shown."
          >
            <DCArtboard id="settings" label="Settings · Tasks editor" width={1280} height={820}>
              <SettingsPage/>
            </DCArtboard>

            <DCArtboard id="extracted" label="Extracted page knowledge" width={1200} height={820}>
              <ExtractedViewer/>
            </DCArtboard>

            <DCArtboard id="research" label="Research dashboard" width={1280} height={860}>
              <ResearchDashboard/>
            </DCArtboard>
          </DCSection>

          {/* ════════ SECTION 4 — Design system reference ════════ */}
          <DCSection
            id="system"
            title="④ Design system · for reference"
            subtitle="Type, palette, glass, components. The vocabulary every surface above is built from."
          >
            <DCArtboard id="tokens" label="Tokens" width={760} height={620}>
              <TokensRef/>
            </DCArtboard>

            <DCArtboard id="components" label="Components" width={760} height={620}>
              <ComponentsRef/>
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    /* ════════ Tokens reference card ════════ */
    function TokensRef() {
      const swatches = [
        { name: '--paper',    v: 'oklch(0.985 0.005 250)' },
        { name: '--paper-2',  v: 'oklch(0.97 0.006 250)' },
        { name: '--hairline', v: 'oklch(0.88 0.01 245)' },
        { name: '--muted',    v: 'oklch(0.62 0.018 250)' },
        { name: '--ink-2',    v: 'oklch(0.32 0.02 254)' },
        { name: '--ink',      v: 'oklch(0.22 0.02 255)' },
        { name: '--accent',   v: 'oklch(0.58 0.18 250)' },
      ];
      return (
        <div className="clear-surface" style={{ padding: 28, height: '100%', background: 'var(--paper)', overflow: 'auto' }}>
          <Eyebrow>Type</Eyebrow>
          <div style={{ display: 'grid', gridTemplateColumns: '110px 1fr', gap: 14, alignItems: 'baseline', margin: '10px 0 24px' }}>
            <span className="clear-mono" style={{ fontSize: 10, color: 'var(--muted)' }}>GEIST</span>
            <div>
              <div style={{ fontSize: 28, fontWeight: 600, letterSpacing: '-0.02em' }}>Read what matters</div>
              <div style={{ fontSize: 14, color: 'var(--muted)', marginTop: 4 }}>UI · headings · chrome</div>
            </div>
            <span className="clear-mono" style={{ fontSize: 10, color: 'var(--muted)' }}>NEWSREADER</span>
            <div>
              <div className="clear-read" style={{ fontSize: 22, lineHeight: 1.4 }}>The grid is bending, not breaking — for now.</div>
              <div style={{ fontSize: 14, color: 'var(--muted)', marginTop: 4 }}>Renarrated body copy only</div>
            </div>
            <span className="clear-mono" style={{ fontSize: 10, color: 'var(--muted)' }}>GEIST MONO</span>
            <div>
              <div className="clear-mono" style={{ fontSize: 13 }}>READING · ARGUMENT · CRITIQUE · 04:21</div>
              <div style={{ fontSize: 14, color: 'var(--muted)', marginTop: 4 }}>Eyebrows · metadata · technical</div>
            </div>
          </div>

          <Eyebrow>Palette</Eyebrow>
          <div style={{ display: 'flex', gap: 8, margin: '10px 0 8px', flexWrap: 'wrap' }}>
            {swatches.map((s) => (
              <div key={s.name} style={{ flex: '1 1 0', minWidth: 80 }}>
                <div style={{ height: 64, borderRadius: 10, background: `var(${s.name})`, border: '1px solid var(--hairline)' }}/>
                <div className="clear-mono" style={{ fontSize: 10, marginTop: 6, color: 'var(--ink-2)' }}>{s.name}</div>
                <div className="clear-mono" style={{ fontSize: 9, color: 'var(--muted)' }}>{s.v}</div>
              </div>
            ))}
          </div>

          <Eyebrow style={{ marginTop: 22 }}>Glass</Eyebrow>
          <div style={{ position: 'relative', height: 130, marginTop: 10, borderRadius: 12, overflow: 'hidden', background: 'linear-gradient(120deg, #c7d2fe 0%, #fef3c7 50%, #bae6fd 100%)' }}>
            <div className="clear-glass" style={{ position: 'absolute', left: 24, top: 24, width: 240, height: 80, padding: 14 }}>
              <div className="clear-mono" style={{ fontSize: 10, color: 'var(--muted)' }}>BACKDROP-BLUR 24 · SAT 140%</div>
              <div style={{ fontSize: 13, fontWeight: 500, marginTop: 6 }}>This is what Clear looks like over any page.</div>
            </div>
            <div className="clear-glass clear-glass--strong" style={{ position: 'absolute', right: 24, top: 24, width: 200, height: 80, padding: 14 }}>
              <div className="clear-mono" style={{ fontSize: 10, color: 'var(--muted)' }}>STRONG · 86%</div>
              <div style={{ fontSize: 13, fontWeight: 500, marginTop: 6 }}>Strong variant for text-dense panels.</div>
            </div>
          </div>
        </div>
      );
    }

    function ComponentsRef() {
      return (
        <div className="clear-surface" style={{ padding: 28, height: '100%', background: 'var(--paper)', overflow: 'auto', display: 'flex', flexDirection: 'column', gap: 22 }}>
          <div>
            <Eyebrow style={{ marginBottom: 10 }}>Buttons</Eyebrow>
            <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', alignItems: 'center' }}>
              <button className="clear-btn clear-btn--primary">Primary</button>
              <button className="clear-btn clear-btn--accent"><Icon.sparkle/>Renarrate</button>
              <button className="clear-btn clear-btn--ghost">Ghost</button>
              <button className="clear-btn">Tertiary</button>
              <button className="clear-btn clear-btn--sm clear-btn--ghost">Small</button>
              <button className="clear-btn clear-btn--xs clear-btn--ghost">XS</button>
            </div>
          </div>

          <div>
            <Eyebrow style={{ marginBottom: 10 }}>Chips</Eyebrow>
            <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
              <span className="clear-chip">default</span>
              <span className="clear-chip clear-chip--accent">accent</span>
              <span className="clear-chip clear-chip--outline">outline</span>
              <span className="clear-chip clear-mono" style={{ fontSize: 10 }}>DEPTH · SKIM</span>
            </div>
          </div>

          <div>
            <Eyebrow style={{ marginBottom: 10 }}>Input</Eyebrow>
            <input className="clear-input" placeholder="Ask Clear about this page…"/>
          </div>

          <div>
            <Eyebrow style={{ marginBottom: 10 }}>Eyebrow + grip + dots</Eyebrow>
            <div style={{ display: 'flex', alignItems: 'center', gap: 16 }}>
              <Grip/>
              <span style={{ width: 1, height: 16, background: 'var(--hairline)' }}/>
              <Icon.dot style={{ color: 'var(--accent)' }}/>
              <Icon.check style={{ color: 'var(--pos)' }}/>
              <Icon.sparkle style={{ color: 'var(--muted)' }}/>
              <Icon.send style={{ color: 'var(--muted)' }}/>
              <Icon.book style={{ color: 'var(--muted)' }}/>
              <Icon.target style={{ color: 'var(--muted)' }}/>
            </div>
          </div>

          <div>
            <Eyebrow style={{ marginBottom: 10 }}>Message bubbles</Eyebrow>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 6, maxWidth: 340 }}>
              <div style={{ alignSelf: 'flex-end', maxWidth: '85%', background: 'var(--ink)', color: 'var(--paper)', padding: '7px 11px', borderRadius: '12px 12px 4px 12px', fontSize: 12.5, lineHeight: 1.45 }}>I want a critical read of this article.</div>
              <div style={{ alignSelf: 'flex-start', fontSize: 12.5, lineHeight: 1.5, color: 'var(--ink-2)', maxWidth: '90%' }}>Got it. I'll surface the argument, the counter-case, and flag where evidence is thin.</div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
